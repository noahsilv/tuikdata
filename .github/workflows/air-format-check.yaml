on:
  pull_request:
    branches: [main, master]

name: air-format-check

jobs:
  air-format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Air
        uses: posit-dev/setup-air@v1

      - name: Check formatting
        run: air format . --check
